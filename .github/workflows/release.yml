name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  verify-version:
    name: Validate version in changelog
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      
      - name: Validate project and changelog versions match pushed tag
        run: |
          ref_name="${{ github.ref_name }}"
          pkg_version=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          [ "${ref_name:1}" = "$pkg_version" ] || exit 1
          cat CHANGELOG.md | grep -q "##\s*\[${ref_name:1}\]"

  build-sdist:
    name: Build source distribution
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - run: pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v7
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    needs: verify-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      
      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==3.4.0
      
      - name: Build wheels
        run: python -m cibuildwheel --output-dir dist
      
      - uses: actions/upload-artifact@v7
        with:
          name: dist-wheels-${{ matrix.os }}
          path: dist/*.whl

  release:
    name: Create release and publish
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyevspace
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract release notes
        id: extract-release-notes
        uses: ffurrer2/extract-release-notes@v3
      
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.extract-release-notes.outputs.release_notes }}
          files: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
