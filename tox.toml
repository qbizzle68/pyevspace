env_list = ["3.14", "3.13", "3.12", "3.11", "3.10", "lint"]

[env_run_base]
description = "run the test suite with pytest"
deps = [
    "pytest>=8",
]
commands = [["pytest"]]

[env.lint]
description = "run linters"
skip_install = true
deps = [
    "flake8",
    "flake8-pyproject",
]
commands = [["flake8"]]