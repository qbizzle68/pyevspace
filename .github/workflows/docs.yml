name: Build and deploy documentation

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'

env:
  SPHINX_BUILD_PATH: docs/build

jobs:
  build_docs:
    name: Build documentation using Sphinx
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install build dependencies
        run: python -m pip install sphinx pydata-sphinx-theme

      - name: Build documentation
        run: sphinx-build -b html docs/source ${{ env.SPHINX_BUILD_PATH }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: documentation
          path: |
            ${{ env.SPHINX_BUILD_PATH }}
            !${{ env.SPHINX_BUILD_PATH }}/_sources
            !${{ env.SPHINX_BUILD_PATH }}/.doctrees

  deploy_docs:
    name: Deploy documentation to server
    needs: [build_docs]
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: documentation

      - name: Upload files using SFTP
        uses: wangyucode/sftp-upload-action@v3
        with:
          host: ${{ secrets.DH_HOST }}
          username: ${{ secrets.DH_USER }}
          password: ${{ secrets.DH_PASS }}
          localDir: '.'
          remoteDir: 'qbizzle.com/pyevspace'
